<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .emoji {
            font-size: 40px;
            text-align: center;
            margin-bottom: 20px;
        }

        .joke-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            line-height: 1.6;
            color: #333;
            text-align: center;
        }

        .joke-content {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 16px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .options {
            margin-bottom: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .option-group {
            margin-bottom: 12px;
        }

        .option-group label {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: #333;
            font-size: 14px;
        }

        .option-group input {
            margin-right: 8px;
            cursor: pointer;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #c33;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #3c3;
            font-size: 14px;
        }

        .joke-info {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .joke-box {
                font-size: 16px;
                min-height: 80px;
            }

            button {
                min-width: 100px;
                padding: 10px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🎭</div>
        <h1>Random Joke Generator</h1>

        <div class="options">
            <div class="option-group">
                <label>
                    <input type="checkbox" id="safeMode" checked>
                    Safe Mode (no offensive jokes)
                </label>
            </div>
            <div class="option-group">
                <label>
                    <input type="radio" name="jokeType" value="any" checked>
                    Any Type
                </label>
            </div>
            <div class="option-group">
                <label>
                    <input type="radio" name="jokeType" value="single">
                    One-Liner Only
                </label>
            </div>
            <div class="option-group">
                <label>
                    <input type="radio" name="jokeType" value="twopart">
                    Setup & Delivery Only
                </label>
            </div>
        </div>

        <div id="message"></div>

        <div class="joke-box" id="jokeBox">
            <div class="loading">
                <span class="spinner"></span>
                <span>Click "Get Joke" to start laughing! 😄</span>
            </div>
        </div>

        <div class="joke-info" id="jokeInfo"></div>

        <div class="button-group">
            <button class="btn-primary" id="getJokeBtn" onclick="fetchJoke()">
                Get Joke
            </button>
            <button class="btn-secondary" id="clearBtn" onclick="clearJoke()">
                Clear
            </button>
        </div>
    </div>

    <script>
        const JOKE_API_URL = 'https://v2.jokeapi.dev/joke/Any';
        let jokeFetched = false;

        /**
         * Fetch a joke from the API based on user options
         */
        async function fetchJoke() {
            const getJokeBtn = document.getElementById('getJokeBtn');
            const jokeBox = document.getElementById('jokeBox');
            const messageDiv = document.getElementById('message');
            const jokeInfo = document.getElementById('jokeInfo');

            // Disable button during fetch
            getJokeBtn.disabled = true;
            messageDiv.innerHTML = '';
            jokeInfo.innerHTML = '';

            try {
                // Show loading state
                jokeBox.innerHTML = '<div class="loading"><span class="spinner"></span><span>Fetching a joke...</span></div>';

                // Get options from form
                const safeMode = document.getElementById('safeMode').checked;
                const jokeType = document.querySelector('input[name="jokeType"]:checked').value;

                // Build URL with parameters
                let url = JOKE_API_URL;
                const params = new URLSearchParams();

                if (safeMode) {
                    params.append('safe-mode', 'true');
                }

                if (jokeType !== 'any') {
                    params.append('type', jokeType);
                }

                if (params.toString()) {
                    url += '?' + params.toString();
                }

                // Fetch the joke
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} ${response.statusText}`);
                }

                const joke = await response.json();

                if (joke.error) {
                    throw new Error(`No jokes found matching your criteria`);
                }

                // Display the joke
                let jokeContent = '';
                if (joke.type === 'single') {
                    jokeContent = joke.joke;
                } else if (joke.type === 'twopart') {
                    jokeContent = `${joke.setup}\n\n${joke.delivery}`;
                }

                jokeBox.innerHTML = `<div class="joke-content">${escapeHtml(jokeContent)}</div>`;
                jokeInfo.innerHTML = `Type: <strong>${joke.type}</strong> | Category: <strong>${joke.category}</strong>`;

                // Show success message
                messageDiv.innerHTML = '<div class="success">✨ Joke fetched successfully!</div>';
                jokeFetched = true;

            } catch (error) {
                console.error('Error fetching joke:', error);
                jokeBox.innerHTML = '';
                messageDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
                jokeFetched = false;
            } finally {
                // Re-enable button
                getJokeBtn.disabled = false;
            }
        }

        /**
         * Clear the joke display
         */
        function clearJoke() {
            const jokeBox = document.getElementById('jokeBox');
            const messageDiv = document.getElementById('message');
            const jokeInfo = document.getElementById('jokeInfo');

            jokeBox.innerHTML = '<div class="loading"><span class="spinner"></span><span>Click "Get Joke" to start laughing! 😄</span></div>';
            messageDiv.innerHTML = '';
            jokeInfo.innerHTML = '';
            jokeFetched = false;
        }

        /**
         * Escape HTML special characters to prevent XSS
         */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Optional: Fetch joke on Enter key
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !document.getElementById('getJokeBtn').disabled) {
                fetchJoke();
            }
        });
    </script>
</body>
</html>
